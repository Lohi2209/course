# H2 Database Configuration (for local development)
spring.datasource.url=jdbc:h2:mem:course_management
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# MySQL Database Configuration (uncomment for production)
#spring.datasource.url=jdbc:mysql://localhost:3306/course_management?createDatabaseIfNotExist=true
#spring.datasource.username=${DB_USERNAME:root}
#spring.datasource.password=${DB_PASSWORD:}
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console (optional - for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
file.upload.dir=./uploads/materials

app.jwt.secret=${JWT_SECRET:my-secret-key-for-jwt-token-generation-at-least-32-characters-long}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.default-admin.username=${DEFAULT_ADMIN_USERNAME:admin}
app.default-admin.password=${DEFAULT_ADMIN_PASSWORD:admin123}
