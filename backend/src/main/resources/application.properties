# Data source
# Production on Render should set DB_URL / DB_USERNAME / DB_PASSWORD / DB_DRIVER_CLASS.
# Local fallback keeps data in a file-based H2 DB.
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/course_management;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.open-in-view=false

# H2 Console (optional - for debugging)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

server.port=8080

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
file.upload.dir=${FILE_UPLOAD_DIR:./uploads/materials}

# HTTP response compression can reduce payload sizes in production.
server.compression.enabled=true

app.jwt.secret=${JWT_SECRET:my-secret-key-for-jwt-token-generation-at-least-32-characters-long}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.default-admin.username=${DEFAULT_ADMIN_USERNAME:admin}
app.default-admin.password=${DEFAULT_ADMIN_PASSWORD:admin123}
