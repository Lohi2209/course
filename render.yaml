services:
  - type: web
    name: course09-backend
    env: java
    rootDir: backend
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/course-management-system-0.0.1-SNAPSHOT.jar
    autoDeploy: true
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION_MS
        value: 86400000
      - key: DEFAULT_ADMIN_USERNAME
        sync: false
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
      - key: FILE_UPLOAD_DIR
        value: /var/data/uploads/materials
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
    disk:
      name: course09-uploads
      mountPath: /var/data/uploads
      sizeGB: 1
